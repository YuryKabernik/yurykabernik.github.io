<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 460" font-family="'Courier New', Courier, monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Outer border -->
  <rect x="6" y="6" width="1428" height="448" fill="white" stroke="#333" stroke-width="2" rx="8"/>

  <!-- "Request Flow" label -->
  <text x="720" y="32" text-anchor="middle" font-size="15" fill="#333">Request Flow</text>

  <!-- Audience Types section background -->
  <rect x="732" y="48" width="296" height="382" fill="#e8e0f0" stroke="#a090c8" stroke-width="1.5" rx="6"/>
  <text x="880" y="74" text-anchor="middle" font-size="14" fill="#444">Audience Types</text>

  <!-- Handlers and Models section background -->
  <rect x="1048" y="48" width="378" height="382" fill="#e8e0f0" stroke="#a090c8" stroke-width="1.5" rx="6"/>
  <text x="1237" y="74" text-anchor="middle" font-size="14" fill="#444">Handlers and Models</text>

  <!-- HTTP Request with Polymorphic Data box -->
  <rect x="22" y="197" width="182" height="72" fill="#d6eddc" stroke="#7ab88a" stroke-width="1.5" rx="5"/>
  <text x="113" y="228" text-anchor="middle" font-size="12" fill="#222">HTTP Request with</text>
  <text x="113" y="248" text-anchor="middle" font-size="12" fill="#222">Polymorphic Data</text>

  <!-- Arrow: HTTP Request -> OpenAPI Discriminator -->
  <line x1="204" y1="233" x2="240" y2="233" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OpenAPI Discriminator box -->
  <rect x="250" y="197" width="188" height="72" fill="#d6eddc" stroke="#7ab88a" stroke-width="1.5" rx="5"/>
  <text x="344" y="228" text-anchor="middle" font-size="12" fill="#222">OpenAPI</text>
  <text x="344" y="248" text-anchor="middle" font-size="12" fill="#222">Discriminator</text>

  <!-- Arrow: OpenAPI Discriminator -> diamond -->
  <line x1="438" y1="233" x2="475" y2="233" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Parsing JSON body diamond -->
  <polygon points="575,165 670,233 575,301 480,233" fill="#fdd96a" stroke="#b8960a" stroke-width="1.5"/>
  <text x="575" y="228" text-anchor="middle" font-size="13" fill="#222">Parsing JSON</text>
  <text x="575" y="247" text-anchor="middle" font-size="13" fill="#222">body</text>

  <!-- Arrow: diamond -> CompanyAudience (top, S-curve) -->
  <path d="M 670 205 C 695 170, 710 145, 737 145" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow: diamond -> GroupAudience (middle, straight) -->
  <line x1="670" y1="233" x2="737" y2="233" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: diamond -> ContactAudience (bottom, S-curve) -->
  <path d="M 670 261 C 695 296, 710 321, 737 321" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- CompanyAudience box -->
  <rect x="747" y="116" width="268" height="58" fill="white" stroke="#a090c8" stroke-width="1.5" rx="5"/>
  <text x="881" y="151" text-anchor="middle" font-size="13" fill="#222">CompanyAudience</text>

  <!-- GroupAudience box -->
  <rect x="747" y="204" width="268" height="58" fill="white" stroke="#a090c8" stroke-width="1.5" rx="5"/>
  <text x="881" y="239" text-anchor="middle" font-size="13" fill="#222">GroupAudience</text>

  <!-- ContactAudience box -->
  <rect x="747" y="292" width="268" height="58" fill="white" stroke="#a090c8" stroke-width="1.5" rx="5"/>
  <text x="881" y="327" text-anchor="middle" font-size="13" fill="#222">ContactAudience</text>

  <!-- Arrow: CompanyAudience -> Invoke Company Handler -->
  <line x1="1015" y1="145" x2="1053" y2="145" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: GroupAudience -> Invoke Group Handler -->
  <line x1="1015" y1="233" x2="1053" y2="233" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: ContactAudience -> Invoke Contact Handler -->
  <line x1="1015" y1="321" x2="1053" y2="321" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Invoke Company Handler + Command box -->
  <rect x="1063" y="116" width="352" height="58" fill="white" stroke="#a090c8" stroke-width="1.5" rx="5"/>
  <text x="1239" y="140" text-anchor="middle" font-size="13" fill="#222">Invoke Company Handler</text>
  <text x="1239" y="160" text-anchor="middle" font-size="13" fill="#222">+ Command</text>

  <!-- Invoke Group Handler + Command box -->
  <rect x="1063" y="204" width="352" height="58" fill="white" stroke="#a090c8" stroke-width="1.5" rx="5"/>
  <text x="1239" y="228" text-anchor="middle" font-size="13" fill="#222">Invoke Group Handler</text>
  <text x="1239" y="248" text-anchor="middle" font-size="13" fill="#222">+ Command</text>

  <!-- Invoke Contact Handler + Command box -->
  <rect x="1063" y="292" width="352" height="58" fill="white" stroke="#a090c8" stroke-width="1.5" rx="5"/>
  <text x="1239" y="316" text-anchor="middle" font-size="13" fill="#222">Invoke Contact Handler</text>
  <text x="1239" y="336" text-anchor="middle" font-size="13" fill="#222">+ Command</text>
</svg>
